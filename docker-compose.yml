version: '3.8'

services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    command: ["postgres", "-c", "port=5400"]
    ports:
      - "5400:5400"

  app:
    build: .
    env_file:
      - .env
    depends_on:
      - db
    ports:
      - "3000:3000"
    command: sh -c "npx prisma migrate dev --name init  && node dist/index.js"