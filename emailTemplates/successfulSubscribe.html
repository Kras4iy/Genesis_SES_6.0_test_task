<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Subscription Successful</title>
<style>
  :root{
    --bg:#0f1724;
    --card:#0b1220;
    --muted:#9aa4b2;
    --accent-start:#06b6d4;
    --accent-end:#7c3aed;
    --glass: rgba(255,255,255,0.03);
    --radius:14px;
    --maxw:720px;
    --success: #10b981;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    font-family:Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    background:
      radial-gradient(1200px 600px at 10% 10%, rgba(124,58,237,0.12), transparent 8%),
      radial-gradient(900px 400px at 90% 90%, rgba(6,182,212,0.08), transparent 8%),
      var(--bg);
    color:#e6eef6;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px;
  }

  .card{
    width:100%;
    max-width:var(--maxw);
    background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
    border-radius:var(--radius);
    padding:28px;
    box-shadow: 0 10px 30px rgba(2,6,23,0.6);
    border: 1px solid rgba(255,255,255,0.03);
    display:grid;
    grid-template-columns: auto 1fr;
    gap:20px;
    align-items:center;
  }

  .icon-wrap{
    width:96px;
    height:96px;
    flex:0 0 96px;
    display:grid;
    place-items:center;
    background: linear-gradient(135deg,var(--accent-start),var(--accent-end));
    border-radius:18px;
    box-shadow: 0 8px 20px rgba(7,10,20,0.6), inset 0 -6px 18px rgba(255,255,255,0.03);
  }
  .icon-wrap svg{width:54px;height:54px;display:block;filter:drop-shadow(0 6px 18px rgba(0,0,0,0.35));}

  h1{
    margin:0 0 6px 0;
    font-size:20px;
    letter-spacing:-0.2px;
    color:#f6fbff;
  }
  p.lead{
    margin:0 0 16px 0;
    color:var(--muted);
    font-size:15px;
    line-height:1.45;
  }

  .meta{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    margin-bottom:18px;
  }
  .chip{
    background:var(--glass);
    border-radius:999px;
    padding:8px 12px;
    color:var(--muted);
    font-size:13px;
    display:inline-flex;
    align-items:center;
    gap:8px;
    border:1px solid rgba(255,255,255,0.02);
  }
  .chip strong{color:#e6eef6;font-weight:600;font-size:13px}

  .actions{display:flex;gap:10px;flex-wrap:wrap}
  .btn{
    -webkit-appearance:none;
    appearance:none;
    border:0;
    background:transparent;
    color:inherit;
    padding:10px 14px;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
    font-size:14px;
    transition:transform .08s ease,box-shadow .12s ease,opacity .08s;
  }
  .btn:active{transform:translateY(1px)}
  .btn-primary{
    background:linear-gradient(90deg,var(--accent-start),var(--accent-end));
    color:white;
    box-shadow: 0 8px 20px rgba(9,12,20,0.6);
  }
  .btn-ghost{
    background:transparent;
    border:1px solid rgba(255,255,255,0.04);
    color:var(--muted);
  }
  .btn-success{
    background:linear-gradient(90deg, rgba(16,185,129,0.12), rgba(16,185,129,0.08));
    color:var(--success);
    border:1px solid rgba(16,185,129,0.12);
  }

  .footer{
    margin-top:12px;
    font-size:13px;
    color:var(--muted);
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
  }

  @media (max-width:640px){
    .card{grid-template-columns:1fr; text-align:center}
    .icon-wrap{margin:0 auto}
    .actions{justify-content:center}
    .meta{justify-content:center}
    .footer{flex-direction:column;align-items:center}
  }
</style>
</head>
<body>
<main class="card" role="main" aria-labelledby="title">
  <div class="icon-wrap" aria-hidden="true">
    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true" focusable="false">
      <rect width="24" height="24" rx="6" fill="white" opacity="0.06"></rect>
      <path d="M9.5 12.8l1.9 1.9 4.6-6" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"></path>
    </svg>
  </div>

  <div>
    <h1 id="title">Subscription confirmed</h1>
    <p class="lead" id="message">Thanks for subscribing! A confirmation email has been sent. Check your inbox to verify and activate notifications.</p>

    <div class="meta" id="meta">
      <div class="chip" id="emailChip" title="Subscribed email"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" style="opacity:.9"><path d="M3 7.5v9A2.5 2.5 0 005.5 19h13a2.5 2.5 0 002.5-2.5v-9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"></path><path d="M22 7.5L12 13 2 7.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"></path></svg><strong id="emailValue">you@domain.com</strong></div>

      <div class="chip" id="repoChip" title="Repository" style="display:none"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" style="opacity:.9"><path d="M12 2v6M5 6v6a7 7 0 0014 0V6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path></svg><span id="repoValue">owner/repo</span></div>
    </div>

    <div class="actions" role="group" aria-label="Actions">
      <button class="btn btn-primary" id="homeBtn">Go to homepage</button>
      <button class="btn btn-ghost" id="copyBtn">Copy email</button>
      <button class="btn btn-success" id="viewRepoBtn" style="display:none">View repo</button>
    </div>

    <div class="footer">
      <small style="opacity:.7">You can unsubscribe any time.</small>
    </div>
  </div>
</main>

<script>
  (function(){
    // populate dynamic values from URL search params (?email=...&repo=...)
    const params = new URLSearchParams(location.search);
    const email = params.get('email');
    const repo = params.get('repo');

    const emailChip = document.getElementById('emailChip');
    const emailValue = document.getElementById('emailValue');
    const repoChip = document.getElementById('repoChip');
    const repoValue = document.getElementById('repoValue');
    const viewRepoBtn = document.getElementById('viewRepoBtn');
    const copyBtn = document.getElementById('copyBtn');
    const homeBtn = document.getElementById('homeBtn');
    const message = document.getElementById('message');

    if (email) {
      emailValue.textContent = decodeURIComponent(email);
      emailChip.style.display = '';
    } else {
      emailValue.textContent = 'Check your inbox';
    }

    if (repo) {
      repoValue.textContent = decodeURIComponent(repo);
      repoChip.style.display = '';
      viewRepoBtn.style.display = '';
      viewRepoBtn.addEventListener('click', () => {
        const url = repo.startsWith('http') ? repo : 'https://github.com/' + repo;
        window.open(url, '_blank', 'noopener');
      });
    }

    copyBtn.addEventListener('click', async () => {
      try {
        const txt = emailValue.textContent || '';
        await navigator.clipboard.writeText(txt);
        copyBtn.textContent = 'Copied!';
        setTimeout(()=> copyBtn.textContent = 'Copy email', 1800);
      } catch (e) {
        copyBtn.textContent = 'Copy failed';
        setTimeout(()=> copyBtn.textContent = 'Copy email', 1800);
      }
    });

    homeBtn.addEventListener('click', () => {
      // adjust as needed to your app's homepage path
      location.href = '/';
    });

    // improved message if email missing
    if (!email) {
      message.textContent = 'Thanks for subscribing! We sent a confirmation to your email. If you do not receive it, check spam or try signing up again.';
    }

    // accessibility: focus primary CTA
    homeBtn.focus();
  })();
</script>
</body>
</html>
